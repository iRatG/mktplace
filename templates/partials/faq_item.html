<div class="card-dark rounded-xl overflow-hidden">
    <button onclick="toggleFaq(this)"
        class="w-full flex items-center justify-between px-6 py-4 text-left hover:bg-white/5 transition-colors">
        <span class="font-medium text-white pr-4">{{ question }}</span>
        <svg class="faq-arrow w-5 h-5 text-slate-400 flex-shrink-0 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>
    <div class="hidden px-6 pb-5 text-sm text-slate-400 leading-relaxed border-t border-white/5 pt-4">
        {{ answer }}
    </div>
</div>
