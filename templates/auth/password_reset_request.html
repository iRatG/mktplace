{% extends "base.html" %}

{% block title %}Сброс пароля — Mktplace{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="card-dark rounded-2xl p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-white mb-2">Сброс пароля</h1>
        <p class="text-sm text-slate-400 mb-6">Введите email — мы пришлём ссылку для смены пароля.</p>

        {% if sent %}
        <div class="alert-success">Письмо отправлено. Проверьте почту.</div>
        {% else %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                <input type="email" name="email" id="id_email"
                    class="input-dark"
                    placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn-orange w-full py-2.5 px-4 text-sm">
                Отправить письмо
            </button>
        </form>
        {% endif %}

        <p class="mt-4 text-sm text-center">
            <a href="{% url 'web:login' %}" class="text-orange-400 hover:text-orange-300 transition-colors">← Вернуться ко входу</a>
        </p>
    </div>
</div>
{% endblock %}
