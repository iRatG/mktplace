{% extends "base.html" %}

{% block title %}Сброс пароля — Mktplace{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Сброс пароля</h1>
        <p class="text-sm text-gray-500 mb-6">Введите email — мы пришлём ссылку для смены пароля.</p>

        {% if sent %}
        <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm">
            Письмо отправлено. Проверьте почту.
        </div>
        {% else %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="id_email"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                Отправить письмо
            </button>
        </form>
        {% endif %}

        <p class="mt-4 text-sm text-center">
            <a href="{% url 'web:login' %}" class="text-indigo-600 hover:underline">← Вернуться ко входу</a>
        </p>
    </div>
</div>
{% endblock %}
